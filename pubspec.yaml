name: dytty
description: "Voice-first daily journaling app"
publish_to: 'none'
version: 0.1.9+15

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^7.2.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  intl: ^0.20.2
  table_calendar: ^3.2.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^8.0.2
  speech_to_text: ^7.0.0
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.5.4
  timezone: ^0.11.0
  firebase_ai: ^3.9.0
  record: ^6.2.0
  flutter_pcm_sound: ^3.3.3
  firebase_storage: ^13.1.0
  package_info_plus: ^9.0.0
  flutter_timezone: ^5.0.2
  circular_menu: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.0.2
  mockito: ^5.4.5
  build_runner: ^2.4.14
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  patrol: ^4.3.0
  patrol_finders: ^3.1.0
  yaml: ^3.1.3

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
