name: dytty
description: "Voice-first daily journaling app"
publish_to: 'none'
version: 0.1.2+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: 4.5.0
  firebase_auth: 6.2.0
  cloud_firestore: 6.0.0
  google_sign_in: ^6.2.2
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  intl: ^0.20.2
  table_calendar: ^3.2.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.2.1
  google_generative_ai: ^0.4.6
  speech_to_text: ^7.0.0
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.5.4
  timezone: ^0.11.0
  firebase_ai: 3.9.0
  record: ^6.2.0
  just_audio: ^0.10.5
  firebase_storage: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: 4.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
