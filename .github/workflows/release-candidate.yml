name: Release Candidate

on:
  push:
    branches: ['release/**']

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test with coverage
        run: flutter test --coverage
      - name: Coverage check
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          min_coverage: 60

  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true
      - run: flutter pub get
      - name: Build web
        run: flutter build web --no-tree-shake-icons --dart-define=FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
      # Shared debug keystore is checked into android/debug.keystore and referenced by build.gradle.kts signingConfig.
      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  maestro:
    name: Maestro E2E (Full Suite)
    runs-on: ubuntu-latest
    needs: analyze-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true
      - run: flutter pub get
      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=USE_EMULATORS=true \
            --dart-define=FIREBASE_ANDROID_API_KEY=dummy
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Run Maestro flows (all)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install build/app/outputs/flutter-apk/app-debug.apk
            mkdir -p maestro-output
            maestro test \
              --debug-output maestro-output \
              --format junit \
              --output maestro-output/results.xml \
              --include-tags=smoke,state,release \
              .maestro/
      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: maestro-output/
          retention-days: 14

  distribute:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: [build, maestro]
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: build/
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DYTTY_4B83D }}
          file: build/app-release.apk
          groups: internal-testers
          releaseNotes: "Release candidate from ${{ github.ref_name }}"
