name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    name: Analyze, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true

      - run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos lib test

      - name: Test with coverage
        run: flutter test --coverage --exclude-tags=golden --machine > test-results.json

      - name: Coverage check
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          min_coverage: 50

      - name: Generate test report
        if: always()
        run: |
          sudo apt-get install -y lcov > /dev/null 2>&1
          genhtml coverage/lcov.info -o coverage/html --quiet
          dart run tool/test_report.dart

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            coverage/html/
            test-report.html
          retention-days: 14

      - name: Build web
        run: flutter build web --no-tree-shake-icons --dart-define=FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  distribute:
    name: Distribute to Testers
    runs-on: ubuntu-latest
    needs: analyze-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/

      - name: Extract release notes from merge commit
        id: notes
        run: |
          BODY=$(git log -1 --pretty=%b)
          if [ -z "$BODY" ]; then
            BODY=$(git log -1 --pretty=%s)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:828440302945:android:8a03bc6c01380939392120
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DYTTY_4B83D }}
          testers: ${{ secrets.TESTER_EMAIL }}
          releaseNotes: ${{ steps.notes.outputs.body }}
          file: build/app/outputs/flutter-apk/app-debug.apk

  maestro:
    name: Maestro Android E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true

      - run: flutter pub get

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=USE_EMULATORS=true \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install build/app/outputs/flutter-apk/app-debug.apk
            mkdir -p maestro-output
            maestro test --debug-output maestro-output --format junit --output maestro-output/results.xml --include-tags=smoke,state .maestro/

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: maestro-output/
          retention-days: 14
