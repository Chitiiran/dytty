name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    name: Analyze, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true

      - run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos lib test

      - name: Create test output directory
        run: mkdir -p test-output/latest/flutter

      - name: Test with coverage
        run: flutter test --coverage --exclude-tags=golden --machine > test-output/latest/flutter/results.json

      - name: Copy coverage data
        if: always()
        run: cp coverage/lcov.info test-output/latest/flutter/lcov.info 2>/dev/null || true

      - name: Coverage check
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          min_coverage: 50

      - name: Generate test report
        if: always()
        run: dart run tool/test_report.dart --run-dir test-output/latest

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-output/latest/report.html
          retention-days: 14

      - name: Build web
        run: flutter build web --no-tree-shake-icons --dart-define=FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      # Shared debug keystore is checked into android/debug.keystore and referenced by build.gradle.kts signingConfig.

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

