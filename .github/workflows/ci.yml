name: CI

on:
  push:
    branches: [main, 'dev/**']
  pull_request:
    branches: [main, 'dev/**']
  merge_group:
    branches: [main, 'dev/**']

jobs:
  # ──────────────────────────────────────────────────
  # Gate 1.5: Device E2E on physical phone (~8-12 min)
  # Runs on self-hosted runner with dedicated test phone
  # Advisory (continue-on-error) until stable
  # Skips gracefully if runner offline or phone disconnected
  # ──────────────────────────────────────────────────
  device-test:
    name: "Gate 1.5: Device E2E (Physical Phone)"
    runs-on: [self-hosted, device-test]
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Check device connected
        shell: bash
        run: |
          export PATH="$PATH:$LOCALAPPDATA/Android/Sdk/platform-tools"
          DEVICE_COUNT=$(adb devices | grep -v 'emulator' | grep -c 'device$' || true)
          if [[ "$DEVICE_COUNT" -eq 0 ]]; then
            echo "::warning::No physical device connected. Skipping device tests."
            echo "SKIP_DEVICE_TEST=true" >> $GITHUB_ENV
          else
            echo "Device connected: $(adb devices | grep 'device$' | head -1)"
            echo "SKIP_DEVICE_TEST=false" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        if: env.SKIP_DEVICE_TEST != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true

      - name: Install dependencies
        if: env.SKIP_DEVICE_TEST != 'true'
        run: flutter pub get

      - name: Restore google-services.json
        if: env.SKIP_DEVICE_TEST != 'true'
        shell: bash
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Run device tests
        if: env.SKIP_DEVICE_TEST != 'true'
        shell: bash
        env:
          FIREBASE_ANDROID_API_KEY: ${{ secrets.FIREBASE_ANDROID_API_KEY }}
          DEVICE_TEST_EMAIL: ${{ secrets.DEVICE_TEST_EMAIL }}
          DEVICE_TEST_UID: ${{ secrets.DEVICE_TEST_UID }}
        run: bash scripts/device-test.sh

      - name: Cleanup test data
        if: env.SKIP_DEVICE_TEST != 'true' && always()
        shell: bash
        env:
          DEVICE_TEST_UID: ${{ secrets.DEVICE_TEST_UID }}
        run: bash scripts/device-cleanup.sh || true

      - name: Upload device screenshots
        if: env.SKIP_DEVICE_TEST != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: device-screenshots
          path: test-output/latest/device-e2e/device/
          retention-days: 14

  analyze-test:
    name: Analyze, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true

      - run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos lib test

      - name: Create test output directory
        run: mkdir -p test-output/latest/flutter

      - name: Test with coverage
        run: flutter test --coverage --exclude-tags=golden --machine > test-output/latest/flutter/results.json

      - name: Copy coverage data
        if: always()
        run: cp coverage/lcov.info test-output/latest/flutter/lcov.info 2>/dev/null || true

      - name: Coverage check
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          min_coverage: 80

      - name: Generate test report
        if: always()
        run: dart run tool/test_report.dart --run-dir test-output/latest

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-output/latest/report.html
          retention-days: 14

      - name: Build web
        run: flutter build web --no-tree-shake-icons --dart-define=FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      # Shared debug keystore is checked into android/debug.keystore and referenced by build.gradle.kts signingConfig.

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  distribute:
    name: Distribute to Testers
    runs-on: ubuntu-latest
    needs: [analyze-test, maestro]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/

      - name: Extract tester checklist from merged PR
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          PR_NUMBER=$(gh pr list --state merged --search "$COMMIT_SHA" --json number --jq '.[0].number' 2>/dev/null)

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
            CHECKLIST=$(echo "$PR_BODY" | sed -n '/^## Tester Checklist/,/^## /{ /^## Tester Checklist/d; /^## /d; p; }' | sed '/^<!--/,/-->/d' | sed -e 's/^[[:space:]]*//' -e '/^$/d')

            if [ -n "$CHECKLIST" ]; then
              NOTES="Please test:"$'\n'"${CHECKLIST}"
            else
              PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')
              NOTES="New build from PR #${PR_NUMBER}: ${PR_TITLE}"$'\n\n'"(No tester checklist provided — check the PR for details.)"
            fi
          else
            SUBJECT=$(git log -1 --pretty=%s)
            NOTES="New build: ${SUBJECT}"$'\n\n'"(No linked PR found.)"
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:828440302945:android:8a03bc6c01380939392120
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DYTTY_4B83D }}
          testers: ${{ secrets.TESTER_EMAIL }}
          releaseNotes: ${{ steps.notes.outputs.body }}
          file: build/app/outputs/flutter-apk/app-debug.apk

  maestro:
    name: Maestro Android E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true

      - run: flutter pub get

      # Shared debug keystore is checked into android/debug.keystore and referenced by build.gradle.kts signingConfig.

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=USE_EMULATORS=true \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install build/app/outputs/flutter-apk/app-debug.apk
            mkdir -p test-output/latest/device-e2e/emulator
            maestro test --debug-output test-output/latest/device-e2e/emulator --format junit --output test-output/latest/device-e2e/emulator/results.xml --include-tags=smoke,state .maestro/

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: test-output/latest/device-e2e/emulator/
          retention-days: 14
