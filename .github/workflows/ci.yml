  maestro:
    name: Maestro Android E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true

      - run: flutter pub get

      # Shared debug keystore is checked into android/debug.keystore and referenced by build.gradle.kts signingConfig.

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=USE_EMULATORS=true \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install build/app/outputs/flutter-apk/app-debug.apk
            mkdir -p test-output/latest/device-e2e/maestro
            maestro test --debug-output test-output/latest/device-e2e/maestro --format junit --output test-output/latest/device-e2e/maestro/results.xml --include-tags=smoke,state .maestro/

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: test-output/latest/device-e2e/maestro/
          retention-days: 14
