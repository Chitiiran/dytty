appId: com.dytty.dytty
name: "Voice: Daily call tool call — save_entry invoked"
tags:
  - voice
  - daily-call
---
- runFlow: "../helpers/login.yaml"

# Open radial menu
- tapOn:
    point: "7%,35%"
- extendedWaitUntil:
    visible: "Start voice call"
    timeout: 5000

- tapOn: "Start voice call"

- runScript:
    file: "../../scripts/voice-test/maestro-clear-logcat.sh"

- tapOn: "Start Call"

- extendedWaitUntil:
    visible: "In call.*"
    timeout: 20000

# Play utterance that should trigger save_entry tool call
- runScript:
    file: "../../scripts/voice-test/maestro-play.sh"
    env:
      WAV: "tool-call-save-entry_0.wav"
      WAIT_FOR: "Turn complete"
      TIMEOUT: "10"

- tapOn: "End call"

- extendedWaitUntil:
    visible: "Call Summary"
    timeout: 10000

- runScript:
    file: "../../scripts/voice-test/maestro-verify.sh"
    env:
      SCENARIO: "tool-call-save-entry"
