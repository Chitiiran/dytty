appId: com.dytty.dytty
name: "Voice: Daily call liveness — AI responds to greeting"
tags:
  - voice
  - daily-call
---
# UI-only flow — audio + logcat handled by orchestrate.py
- runFlow: "../helpers/login.yaml"

# Open radial menu by tapping a calendar date
- tapOn:
    point: "7%,35%"
- extendedWaitUntil:
    visible: "Start voice call"
    timeout: 5000

# Navigate to voice call screen
- tapOn: "Start voice call"

# Start the call
- tapOn: "Start Call"

# Wait for call to connect
# Orchestrator watches for "[DYTTY] Call state: active" and plays audio
- extendedWaitUntil:
    visible: "In call.*"
    timeout: 20000

# Wait for AI response (orchestrator plays audio, AI processes)
- extendedWaitUntil:
    visible: ".*"
    timeout: 30000

# End call
- tapOn: "End call"

# Wait for post-call screen
- extendedWaitUntil:
    visible: "Call Summary"
    timeout: 10000
