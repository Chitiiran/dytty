appId: com.dytty.dytty
name: "Voice: Basic voice note — transcript captured"
tags:
  - voice
  - voice-note
---
- runFlow: "../helpers/login.yaml"

# Tap the mic FAB to start recording
- tapOn: "Record voice note"

# Wait for recording sheet to appear (Listening state)
- extendedWaitUntil:
    visible: ".*Listening.*"
    timeout: 5000

# Play audio — play-only mode (no logcat monitoring).
# speech_to_text runs on-device, no [DYTTY] tags. We assert the UI instead.
- runScript:
    file: "../../scripts/voice-test/maestro-play.sh"
    env:
      WAV: "voice-note-basic_0.wav"
      PLAY_ONLY: "true"

# Verify transcript appeared on screen (partial match on key words)
- extendedWaitUntil:
    visible: ".*grocery.*"
    timeout: 15000
