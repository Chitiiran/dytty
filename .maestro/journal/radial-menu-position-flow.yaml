appId: com.dytty.dytty
name: "Radial menu opens near tapped date (#175)"
tags:
  - smoke
  - journal
---
- runFlow: "../helpers/login.yaml"

- takeScreenshot: ".maestro/screenshots/latest/journal/10-home-calendar"

# Test 1: Tap mid-calendar date — menu should open near it
- tapOn:
    point: "7%,35%"
- extendedWaitUntil:
    visible: "Start voice call"
    timeout: 5000

- takeScreenshot: ".maestro/screenshots/latest/journal/11-radial-menu-mid-calendar"

# Dismiss
- tapOn:
    point: "5%,95%"
- extendedWaitUntil:
    notVisible: "Start voice call"
    timeout: 3000

# Test 2: Tap top-row date — menu should clamp within bounds
- tapOn:
    point: "37%,26%"
- extendedWaitUntil:
    visible: "Start voice call"
    timeout: 5000

- takeScreenshot: ".maestro/screenshots/latest/journal/12-radial-menu-top-row"

# Dismiss
- tapOn:
    point: "5%,95%"
- extendedWaitUntil:
    notVisible: "Start voice call"
    timeout: 3000

# Test 3: Tap bottom-row date
- tapOn:
    point: "7%,44%"
- extendedWaitUntil:
    visible: "Start voice call"
    timeout: 5000

- takeScreenshot: ".maestro/screenshots/latest/journal/13-radial-menu-bottom-row"

- tapOn:
    point: "5%,95%"
- extendedWaitUntil:
    notVisible: "Start voice call"
    timeout: 3000

- takeScreenshot: ".maestro/screenshots/latest/journal/14-final"
